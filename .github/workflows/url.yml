name: Virtualmin Offline Bundle Builder

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      bundle_type:
        description: 'Bundle type (LAMP or LEMP)'
        required: true
        default: 'LAMP'
        type: choice
        options:
          - LAMP
          - LEMP
      os_target:
        description: 'Target OS family'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - debian
          - rhel

env:
  BUNDLE_TYPE: ${{ github.event.inputs.bundle_type || 'LAMP' }}
  OS_TARGET: ${{ github.event.inputs.os_target || 'all' }}
  VIRTUALMIN_HOST: download.virtualmin.com
  SOFTWARE_HOST: software.virtualmin.com
  WEBMIN_HOST: download.webmin.com

jobs:
  extract-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl jq
          pip install requests beautifulsoup4

      - name: Download and analyze Virtualmin install script
        id: analyze
        run: |
          echo "Downloading Virtualmin install script..."
          wget -q "https://${{ env.VIRTUALMIN_HOST }}/virtualmin-install" -O virtualmin-install.sh ||           wget -q "https://${{ env.SOFTWARE_HOST }}/gpl/scripts/virtualmin-install.sh" -O virtualmin-install.sh

          # Extract version
          VER=$(grep -oP 'VER=\K[0-9.]+' virtualmin-install.sh || echo "unknown")
          echo "VIRTUALMIN_VERSION=$VER" >> $GITHUB_ENV
          echo "Detected Virtualmin version: $VER"

          chmod +x virtualmin-install.sh

      - name: Extract all download URLs from script using Python
        id: extract_urls
        run: |
          echo "Extracting all URLs from install script using Python..."

          # Use the external Python script if available, otherwise inline
          if [ -f "virtualmin_offline_generator.py" ]; then
            echo "Using external Python script..."
            python3 virtualmin_offline_generator.py --extract-only
          else
            echo "External script not found, using inline extraction..."
            cat > extract_urls.py << 'PYEOF'
          import re
          import os

          with open('virtualmin-install.sh', 'r') as f:
              content = f.read()

          urls = set()

          # Pattern 1: Direct URLs in quotes
          for match in re.findall(r'https?://[^\s'"<>\)\|]+', content):
              urls.add(match)

          # Pattern 2: Variable constructions
          host_patterns = [
              (r'download_virtualmin_host\s*=\s*"([^"]+)"', 'download.virtualmin.com'),
              (r'download_virtualmin_host_lib\s*=\s*"([^"]+)"', 'download.virtualmin.com'),
              (r'download_webmin_host\s*=\s*"([^"]+)"', 'download.webmin.com'),
              (r'download_old_virtualmin_host\s*=\s*"([^"]+)"', 'software.virtualmin.com'),
          ]

          for pattern, default in host_patterns:
              m = re.search(pattern, content)
              host = m.group(1) if m else default

              # Add known paths
              urls.add(f"https://{host}/slib.sh")
              urls.add(f"https://{host}/install")
              urls.add(f"https://{host}/migrate")

          # EPEL URLs
          for match in re.findall(r'dl\.fedoraproject\.org[^\s'"<>]+', content):
              urls.add(f"https://{match}")

          # Write to file
          with open('urls.txt', 'w') as f:
              for url in sorted(urls):
                  f.write(url + '\n')

          print(f"Extracted {len(urls)} unique URLs")
          PYEOF
            python3 extract_urls.py
          fi

          # Count URLs
          URL_COUNT=$(wc -l < urls.txt)
          echo "URL_COUNT=$URL_COUNT" >> $GITHUB_ENV
          echo "Found $URL_COUNT URLs to download"

      - name: Download Virtualmin packages from download.virtualmin.com
        id: download_packages
        run: |
          mkdir -p packages/core packages/dependencies

          echo "Downloading from download.virtualmin.com..."

          # Get directory listing and download all packages
          wget -q -O - "https://${{ env.VIRTUALMIN_HOST }}/" |             grep -oP 'href="\K[^"]+\.(rpm|deb|tar\.gz|sh)' |             while read file; do
              echo "Downloading: $file"
              wget -q -P packages/core "https://${{ env.VIRTUALMIN_HOST }}/$file" ||               curl -sL -o "packages/core/$file" "https://${{ env.VIRTUALMIN_HOST }}/$file"
            done

          # Download slib.sh
          wget -q -P packages/dependencies "https://${{ env.VIRTUALMIN_HOST }}/slib.sh" ||           wget -q -P packages/dependencies "https://${{ env.SOFTWARE_HOST }}/lib/slib.sh"

          echo "Core packages downloaded:"
          ls -la packages/core/

      - name: Download Webmin packages
        id: download_webmin
        run: |
          echo "Downloading Webmin packages..."

          # Download webmin packages from webmin repo
          wget -q -O - "https://${{ env.WEBMIN_HOST }}/" |             grep -oP 'href="\K[^"]+\.(rpm|deb|tar\.gz)' | head -20 |             while read file; do
              echo "Downloading webmin: $file"
              wget -q -P packages/core "https://${{ env.WEBMIN_HOST }}/$file" || true
            done

      - name: Download EPEL and external dependencies
        id: download_deps
        run: |
          echo "Downloading external dependencies..."

          # EPEL release packages for RHEL-based systems
          for ver in 7 8 9; do
            wget -q -P packages/dependencies "https://dl.fedoraproject.org/pub/epel/epel-release-latest-${ver}.noarch.rpm" || true
          done

          # Download any additional URLs found in script
          while read url; do
            if [[ "$url" == *"dl.fedoraproject.org"* ]] || [[ "$url" == *"software.virtualmin.com/lib"* ]]; then
              filename=$(basename "$url")
              echo "Downloading dependency: $filename"
              wget -q -P packages/dependencies "$url" || curl -sL -o "packages/dependencies/$filename" "$url" || true
            fi
          done < urls.txt

      - name: Categorize and catalog all downloaded files
        id: catalog
        run: |
          cat > catalog.py << 'PYEOF'
          import os
          import json
          import hashlib
          from datetime import datetime

          def get_file_info(filepath):
              stat = os.stat(filepath)
              sha256 = hashlib.sha256()
              with open(filepath, 'rb') as f:
                  for chunk in iter(lambda: f.read(8192), b''):
                      sha256.update(chunk)
              return {
                  'filename': os.path.basename(filepath),
                  'size': stat.st_size,
                  'sha256': sha256.hexdigest(),
                  'path': filepath
              }

          # Core Virtualmin/Webmin packages
          core_keywords = [
              'webmin', 'usermin', 'virtualmin', 'virtual-server',
              'virtualmin-nginx', 'virtualmin-config', 'virtualmin-lamp',
              'virtualmin-lemp', 'procmail-wrapper', 'jailkit'
          ]

          core_files = []
          dep_files = []

          for root, dirs, files in os.walk('packages'):
              for file in files:
                  filepath = os.path.join(root, file)
                  info = get_file_info(filepath)

                  is_core = any(kw in file.lower() for kw in core_keywords)

                  if is_core or 'core' in root:
                      info['category'] = 'core'
                      core_files.append(info)
                  else:
                      info['category'] = 'dependency'
                      dep_files.append(info)

          manifest = {
              'generated_at': datetime.now().isoformat(),
              'virtualmin_version': os.environ.get('VIRTUALMIN_VERSION', 'unknown'),
              'bundle_type': os.environ.get('BUNDLE_TYPE', 'LAMP'),
              'os_target': os.environ.get('OS_TARGET', 'all'),
              'total_files': len(core_files) + len(dep_files),
              'core_files_count': len(core_files),
              'dependency_files_count': len(dep_files),
              'core_files': sorted(core_files, key=lambda x: x['filename']),
              'dependency_files': sorted(dep_files, key=lambda x: x['filename'])
          }

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print(f"Cataloged {len(core_files)} core + {len(dep_files)} dependency files")
          PYEOF

          python3 catalog.py

      - name: Generate offline install script
        id: generate_installer
        run: |
          cat > generate_offline_installer.py << 'PYEOF'
          import re
          import os

          with open('virtualmin-install.sh', 'r') as f:
              original = f.read()

          # Create offline version
          offline = original

          # Add offline header
          offline_header = 
