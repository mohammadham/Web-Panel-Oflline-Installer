# راه‌حل نصب آفلاین Virtualmin

## Virtualmin Offline Installation Solution

این پروژه شامل دو فایل اصلی است که به شما امکان می‌دهد Virtualmin را به صورت کاملاً آفلاین روی سرور لینوکسی خود نصب کنید.

---

## 📁 فایل‌های تولید شده

### 1. `virtualmin_offline_generator.py`
**اسکریپت پایتون برای استخراج و تحلیل**

این اسکریپت وظایف زیر را انجام می‌دهد:
- دانلود آخرین نسخه اسکریپت نصب Virtualmin از `download.virtualmin.com`
- استخراج تمام URLهای دانلود از داخل اسکریپت
- دسته‌بندی فایل‌ها به دو گروه **Core** (هسته) و **Dependencies** (وابستگی‌ها)
- تولید اسکریپت نصب اصلاح‌شده برای حالت آفلاین
- تولید فایل‌های مستندات (README, manifest.json)
- تولید اسکریپت `download-all.sh` برای دانلود خودکار تمام پکیج‌ها

### 2. `virtualmin_offline_workflow.yml`
**GitHub Actions Workflow برای اتوماسیون کامل**

این workflow وظایف زیر را به صورت خودکار انجام می‌دهد:
- دانلود و تحلیل اسکریپت نصب Virtualmin
- دانلود تمام پکیج‌های Virtualmin از `download.virtualmin.com`
- دانلود پکیج‌های Webmin از `download.webmin.com`
- دانلود وابستگی‌های خارجی (EPEL, slib.sh, etc.)
- دسته‌بندی و کاتالوگ کردن تمام فایل‌ها با SHA256
- تولید اسکریپت نصب آفلاین
- تولید مستندات
- ساخت سه فایل آرشیو مجزا:
  1. **Core Archive** - پکیج‌های هسته Virtualmin
  2. **Dependencies Archive** - وابستگی‌ها و اسکریپت‌های کمکی
  3. **Full Bundle** - تمام فایل‌ها در یک آرشیو
- انتشار خودکار در GitHub Releases

---

## 🔧 نحوه استفاده

### روش ۱: استفاده از GitHub Actions (توصیه شده)

1. فایل `virtualmin_offline_workflow.yml` را در مسیر `.github/workflows/` ریپازیتوری خود کپی کنید
2. به بخش **Actions** در GitHub بروید
3. workflow را به صورت دستی اجرا کنید (Run workflow) یا منتظر زمان‌بندی هفتگی بمانید
4. از بخش **Releases**، آرشیوهای تولید شده را دانلود کنید

### روش ۲: استفاده از اسکریپت پایتون به صورت محلی

```bash
# نصب پیش‌نیازها
pip install requests beautifulsoup4

# اجرای اسکریپت
python3 virtualmin_offline_generator.py

# دانلود تمام پکیج‌ها
cd virtualmin-offline-bundle
chmod +x download-all.sh
./download-all.sh
```

