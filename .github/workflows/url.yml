## 🚀 نصب روی سرور آفلاین

### پیش‌نیازها
- سیستم‌عامل تازه نصب شده (Rocky Linux, AlmaLinux, Debian, Ubuntu LTS)
- حداقل 1GB RAM (4GB برای نصب کامل با ایمیل)
- دسترسی root

### مراحل نصب

```bash
# 1. انتقال آرشیو به سرور آفلاین (USB, SCP, etc.)
# 2. استخراج آرشیو
sudo mkdir -p /opt/virtualmin-offline
sudo tar -xzf virtualmin-*-full-offline-*.tar.gz -C /opt/virtualmin-offline

# 3. اجرای نصب‌کننده آفلاین
cd /opt/virtualmin-offline
sudo chmod +x virtualmin-install-offline.sh
sudo ./virtualmin-install-offline.sh --bundle LAMP

# 4. دسترسی به پنل
# باز کردن مرورگر: https://your-server-ip:10000
# لاگین با credentials روت
```

---

## 📋 پکیج‌های هسته (Core)

| پکیج | توضیحات |
|------|---------|
| webmin | پنل مدیریت وب‌بیس |
| usermin | رابط کاربری سطح کاربر |
| virtualmin-core | هسته اصلی Virtualmin |
| virtualmin-config | سیستم پیکربندی |
| webmin-virtual-server | مدیریت سرور مجازی |
| virtualmin-lamp-stack | پکیج کامل LAMP |
| virtualmin-lemp-stack | پکیج کامل LEMP |
| procmail-wrapper | wrapper پروcmail |
| jailkit | محیط restricted shell |

---

## ⚠️ نکات مهم

1. **امنیت:** این باندل شامل پکیج‌هایی است که در زمان تولید موجود بوده‌اند. برای استفاده در محیط production، توصیه می‌شود ماهانه regenerate شود.

2. **نسخه GPL:** این باندل برای نسخه GPL Virtualmin است. برای نسخه Professional، باید license key را به صورت دستی در `/etc/virtualmin-license` اضافه کنید.

3. **سازگاری OS:** مطمئن شوید نسخه OS شما در لیست پشتیبانی شده باشد.

4. **نصب تازه:** این اسکریپت فقط برای نصب تازه (fresh install) طراحی شده است. هرگز روی سیستمی که قبلاً Virtualmin دارد اجرا نکنید.

