## 📦 ساختار فایل‌های خروجی

```
virtualmin-offline-bundle/
├── virtualmin-install-original.sh    # اسکریپت اصلی (مرجع)
├── virtualmin-install-offline.sh     # اسکریپت اصلاح‌شده برای آفلاین
├── manifest.json                      # لیست کامل فایل‌ها با SHA256
├── README.md                          # مستندات نصب
├── download-all.sh                  # اسکریپت دانلود خودکار
└── packages/
    ├── core/                          # پکیج‌های هسته
    │   ├── webmin-*.deb/rpm
    │   ├── usermin-*.deb/rpm
    │   ├── virtualmin-core-*.deb/rpm
    │   └── ...
    └── dependencies/                  # وابستگی‌ها
        ├── slib.sh
        ├── epel-release-*.rpm
        └── ...
```

