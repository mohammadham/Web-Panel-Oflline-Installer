name: Virtualmin Offline Bundle Builder

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      bundle_type:
        description: 'Bundle type (LAMP or LEMP)'
        required: true
        default: 'LAMP'
        type: choice
        options:
          - LAMP
          - LEMP
      os_target:
        description: 'Target OS family'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - debian
          - rhel

env:
  BUNDLE_TYPE: ${{ github.event.inputs.bundle_type || 'LAMP' }}
  OS_TARGET: ${{ github.event.inputs.os_target || 'all' }}
  VIRTUALMIN_HOST: download.virtualmin.com
  SOFTWARE_HOST: software.virtualmin.com
  WEBMIN_HOST: download.webmin.com

jobs:
  extract-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl jq
          pip install requests beautifulsoup4

      - name: Download and analyze Virtualmin install script
        id: analyze
        run: |
          echo "Downloading Virtualmin install script..."
          wget -q "https://${{ env.VIRTUALMIN_HOST }}/virtualmin-install" -O virtualmin-install.sh ||           wget -q "https://${{ env.SOFTWARE_HOST }}/gpl/scripts/virtualmin-install.sh" -O virtualmin-install.sh

          # Extract version
          VER=$(grep -oP 'VER=\K[0-9.]+' virtualmin-install.sh || echo "unknown")
          echo "VIRTUALMIN_VERSION=$VER" >> $GITHUB_ENV
          echo "Detected Virtualmin version: $VER"

          chmod +x virtualmin-install.sh

      - name: Extract all download URLs using Python
        id: extract_urls
        run: |
          echo "Extracting all URLs from install script..."

          # Check for external Python script
          if [ -f "scripts/virtualmin_offline_generator.py" ]; then
            echo "✓ Using external Python script: scripts/virtualmin_offline_generator.py"
            python3 scripts/virtualmin_offline_generator.py --extract-only
          else
            echo "✗ ERROR: scripts/virtualmin_offline_generator.py not found!"
            echo "Directory contents:"
            ls -la
            echo "Scripts directory:"
            ls -la scripts/ 2>/dev/null || echo "No scripts/ directory"
            exit 1
          fi

          # Verify urls.txt was created in project root
          if [ ! -f "urls.txt" ]; then
            echo "ERROR: urls.txt was not created in project root!"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi

          echo "✓ urls.txt created successfully"

          # Count URLs
          URL_COUNT=$(wc -l < urls.txt)
          echo "URL_COUNT=$URL_COUNT" >> $GITHUB_ENV
          echo "Found $URL_COUNT URLs to download"

      - name: Download Virtualmin packages
        id: download_packages
        run: |
          mkdir -p packages/core packages/dependencies

          echo "Downloading from download.virtualmin.com..."

          # Get directory listing and download all packages
          wget -q -O - "https://${{ env.VIRTUALMIN_HOST }}/" |             grep -oP 'href="\K[^"]+\.(rpm|deb|tar\.gz|sh)' |             while read file; do
              echo "Downloading: $file"
              wget -q -P packages/core "https://${{ env.VIRTUALMIN_HOST }}/$file" ||               curl -sL -o "packages/core/$file" "https://${{ env.VIRTUALMIN_HOST }}/$file"
            done

          # Download slib.sh
          wget -q -P packages/dependencies "https://${{ env.VIRTUALMIN_HOST }}/slib.sh" ||           wget -q -P packages/dependencies "https://${{ env.SOFTWARE_HOST }}/lib/slib.sh"

          echo "Core packages downloaded:"
          ls -la packages/core/

      - name: Download Webmin packages
        id: download_webmin
        run: |
          echo "Downloading Webmin packages..."

          wget -q -O - "https://${{ env.WEBMIN_HOST }}/" |             grep -oP 'href="\K[^"]+\.(rpm|deb|tar\.gz)' | head -20 |             while read file; do
              echo "Downloading webmin: $file"
              wget -q -P packages/core "https://${{ env.WEBMIN_HOST }}/$file" || true
            done

      - name: Download EPEL and external dependencies
        id: download_deps
        run: |
          echo "Downloading external dependencies..."

          # EPEL release packages for RHEL-based systems
          for ver in 7 8 9; do
            wget -q -P packages/dependencies "https://dl.fedoraproject.org/pub/epel/epel-release-latest-${ver}.noarch.rpm" || true
          done

          # Download any additional URLs found in script
          while read url; do
            if [[ "$url" == *"dl.fedoraproject.org"* ]] || [[ "$url" == *"software.virtualmin.com/lib"* ]]; then
              filename=$(basename "$url")
              echo "Downloading dependency: $filename"
              wget -q -P packages/dependencies "$url" || curl -sL -o "packages/dependencies/$filename" "$url" || true
            fi
          done < urls.txt

      - name: Categorize and catalog all files
        id: catalog
        run: |
          python3 scripts/virtualmin_offline_generator.py --download-only

      - name: Generate offline install script
        id: generate_installer
        run: |
          python3 scripts/virtualmin_offline_generator.py

      - name: Create archive bundles
        id: create_archives
        run: |
          VERSION=${{ env.VIRTUALMIN_VERSION }}
          BUNDLE=${{ env.BUNDLE_TYPE }}
          DATE=$(date +%Y%m%d)

          # Create three archives as requested

          # 1. Core packages only
          echo "Creating core-only archive..."
          tar -czf "virtualmin-${VERSION}-core-${BUNDLE}-${DATE}.tar.gz"             -C virtualmin-offline-bundle core/ manifest.json README.md virtualmin-install-offline.sh

          # 2. Dependencies only
          echo "Creating dependencies archive..."
          tar -czf "virtualmin-${VERSION}-deps-${BUNDLE}-${DATE}.tar.gz"             -C virtualmin-offline-bundle dependencies/

          # 3. Full bundle (everything)
          echo "Creating full bundle archive..."
          tar -czf "virtualmin-${VERSION}-full-offline-${BUNDLE}-${DATE}.tar.gz"             -C virtualmin-offline-bundle .

          # List archives
          ls -lh *.tar.gz

          # Save archive names for release
          echo "CORE_ARCHIVE=virtualmin-${VERSION}-core-${BUNDLE}-${DATE}.tar.gz" >> $GITHUB_ENV
          echo "DEPS_ARCHIVE=virtualmin-${VERSION}-deps-${BUNDLE}-${DATE}.tar.gz" >> $GITHUB_ENV
          echo "FULL_ARCHIVE=virtualmin-${VERSION}-full-offline-${BUNDLE}-${DATE}.tar.gz" >> $GITHUB_ENV
          echo "RELEASE_TAG=v${VERSION}-${DATE}" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Virtualmin ${{ env.VIRTUALMIN_VERSION }} Offline Bundle (${{ env.BUNDLE_TYPE }})
          body: |
            ## Virtualmin Offline Installation Bundle

            **Version:** ${{ env.VIRTUALMIN_VERSION }}  
            **Bundle Type:** ${{ env.BUNDLE_TYPE }}  
            **Generated:** ${{ github.run_started_at }}

            ### 📦 Archives Included

            1. **Core Package** (`${{ env.CORE_ARCHIVE }}`)
               - Essential Virtualmin/Webmin packages
               - Offline installer script
               - Documentation

            2. **Dependencies** (`${{ env.DEPS_ARCHIVE }}`)
               - Helper scripts (slib.sh, etc.)
               - EPEL release packages
               - External dependencies

            3. **Full Bundle** (`${{ env.FULL_ARCHIVE }}`)
               - Everything in one archive
               - Complete offline installation set

            ### 🚀 Quick Start

            ```bash
            # On offline server:
            tar -xzf ${{ env.FULL_ARCHIVE }} -C /opt/virtualmin-offline
            cd /opt/virtualmin-offline
            sudo ./virtualmin-install-offline.sh --bundle ${{ env.BUNDLE_TYPE }}
            ```

            ### 📋 File Count
            - Core packages: ${{ env.URL_COUNT }}+ files
            - See `manifest.json` in each archive for complete listing

            ### ⚠️ Notes
            - For **GPL version** (Professional requires license key)
            - Packages are current as of generation date
            - Regenerate monthly for security updates
          files: |
            ${{ env.CORE_ARCHIVE }}
            ${{ env.DEPS_ARCHIVE }}
            ${{ env.FULL_ARCHIVE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts for debugging
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-${{ env.RELEASE_TAG }}
          path: |
            manifest.json
            urls.txt
            virtualmin-install.sh
            packages/
            virtualmin-offline-bundle/
          retention-days: 7

      - name: Summary
        run: |
          echo "## ✅ Virtualmin Offline Bundle Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Virtualmin Version | ${{ env.VIRTUALMIN_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Type | ${{ env.BUNDLE_TYPE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Tag | ${{ env.RELEASE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Archive | ${{ env.CORE_ARCHIVE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deps Archive | ${{ env.DEPS_ARCHIVE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Archive | ${{ env.FULL_ARCHIVE }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Download from Release" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}" >> $GITHUB_STEP_SUMMARY
