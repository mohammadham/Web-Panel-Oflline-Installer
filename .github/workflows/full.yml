name: Build Offline Virtualmin/Webmin Package Bundle (Complete + Release)

on:
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: 'Ubuntu Version'
        required: true
        default: 'jammy'
        type: choice
        options:
          - jammy
          - noble
      bundle_type:
        description: 'Bundle Type'
        required: true
        default: 'virtualmin-full-lamp'
        type: choice
        options:
          - webmin-only
          - virtualmin-full-lamp
          - virtualmin-full-lemp
          - virtualmin-mini-lamp
          - virtualmin-mini-lemp
          - cockpit-web
      release_version:
        description: 'Release Version Tag (e.g. v1.0.0) - Leave empty for auto'
        required: false
        default: ''
        type: string

jobs:
  build-offline-bundle:
    runs-on: ubuntu-latest
    container: ubuntu:${{ github.event.inputs.ubuntu_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          apt-get update
          apt-get install -y wget curl gnupg2 ca-certificates lsb-release dpkg-dev apt-utils
          mkdir -p /offline-bundle/packages
          mkdir -p /offline-bundle/scripts
          mkdir -p /offline-bundle/repos
          mkdir -p /offline-bundle/docs
          mkdir -p /etc/apt/keyrings

      # ============================================
      # SETUP REPOSITORIES WITH FALLBACK
      # ============================================
      - name: Setup Virtualmin/Webmin Repositories (3-Fallback)
        if: contains(github.event.inputs.bundle_type, 'virtualmin') || github.event.inputs.bundle_type == 'webmin-only'
        run: |
          echo "=== Setting up repositories with fallback ==="
          METHOD_SUCCESS=false

          # Method 1: Virtualmin 7 GPG Key
          if curl -fsSL --connect-timeout 15 --max-time 30 \
            "https://software.virtualmin.com/lib/RPM-GPG-KEY-virtualmin-7" \
            -o /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
            if gpg --dry-run --import /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
              echo "deb [signed-by=/etc/apt/keyrings/virtualmin-7.asc] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
                > /etc/apt/sources.list.d/virtualmin.list
              METHOD_SUCCESS=true
              echo "✅ Method 1: Virtualmin 7 key OK"
            fi
          fi

          # Method 2: Virtualmin 6 GPG Key
          if [ "$METHOD_SUCCESS" = false ]; then
            if curl -fsSL --connect-timeout 15 --max-time 30 \
              "https://software.virtualmin.com/lib/RPM-GPG-KEY-virtualmin-6" \
              -o /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
              if gpg --dry-run --import /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
                echo "deb [signed-by=/etc/apt/keyrings/virtualmin-7.asc] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
                  > /etc/apt/sources.list.d/virtualmin.list
                METHOD_SUCCESS=true
                echo "✅ Method 2: Virtualmin 6 key OK"
              fi
            fi
          fi

          # Method 3: Webmin Key + Trusted Virtualmin
          if [ "$METHOD_SUCCESS" = false ]; then
            if curl -fsSL --connect-timeout 15 --max-time 30 \
              "https://download.webmin.com/jcameron-key.asc" \
              -o /etc/apt/keyrings/webmin.asc 2>/dev/null; then
              if gpg --dry-run --import /etc/apt/keyrings/webmin.asc 2>/dev/null; then
                echo "deb [signed-by=/etc/apt/keyrings/webmin.asc] https://download.webmin.com/download/repository sarge contrib" \
                  > /etc/apt/sources.list.d/webmin.list
                echo "deb [trusted=yes] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
                  > /etc/apt/sources.list.d/virtualmin.list
                METHOD_SUCCESS=true
                echo "✅ Method 3: Webmin key + trusted Virtualmin OK"
              fi
            fi
          fi

          # Fallback: No GPG
          if [ "$METHOD_SUCCESS" = false ]; then
            echo "deb [trusted=yes] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
              > /etc/apt/sources.list.d/virtualmin.list
            echo "deb [trusted=yes] https://download.webmin.com/download/repository sarge contrib" \
              > /etc/apt/sources.list.d/webmin.list
            echo "⚠️ FALLBACK: No GPG verification"
          fi

          apt-get update || echo "Some repos failed, continuing..."

      # ============================================
      # DOWNLOAD ALL DEPENDENCIES COMPLETELY
      # ============================================
      - name: Download Complete Dependencies
        run: |
          echo "=== Downloading all dependencies ==="

          # Common system dependencies
          apt-get install --download-only -y \
            perl libnet-ssleay-perl openssl \
            libauthen-pam-perl libpam-runtime \
            libio-pty-perl apt-show-versions python3 \
            unzip shared-mime-info ca-certificates \
            curl wget gnupg2 lsb-release \
            2>/dev/null || true

          # Core webmin dependencies
          apt-get install --download-only -y \
            webmin usermin \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true

      # ============================================
      # WEBMIN ONLY BUNDLE
      # ============================================
      - name: Build Webmin-Only Bundle
        if: github.event.inputs.bundle_type == 'webmin-only'
        run: |
          echo "=== Building Webmin-Only Bundle ==="

          # Download Webmin with all deps
          apt-get install --download-only -y webmin 2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated webmin 2>/dev/null || true

          # Ensure all dependencies are downloaded
          apt-get install --download-only -y \
            perl libnet-ssleay-perl openssl \
            libauthen-pam-perl libpam-runtime \
            libio-pty-perl apt-show-versions python3 \
            unzip shared-mime-info libapt-pkg-perl \
            libjson-pp-perl libencode-locale-perl \
            libfile-listing-perl libhtml-parser-perl \
            libhtml-tagset-perl libhtml-tree-perl \
            libhttp-cookies-perl libhttp-date-perl \
            libhttp-message-perl libhttp-negotiate-perl \
            libio-html-perl libio-socket-ssl-perl \
            liblwp-mediatypes-perl liblwp-protocol-https-perl \
            libnet-http-perl libnet-smtp-ssl-perl \
            libsocket6-perl libtimedate-perl \
            liburi-perl libwww-perl libwww-robotrules-perl \
            2>/dev/null || true

          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ 2>/dev/null || true

          # Create comprehensive install script
          cat > /offline-bundle/scripts/install.sh << 'INSTALLER'
          #!/bin/bash
          # Offline Webmin Installer
          # Generated automatically - DO NOT EDIT

          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          PACKAGE_DIR="$SCRIPT_DIR/../packages"
          LOG_FILE="/var/log/offline-install.log"

          # Colors
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          log() { echo -e "${GREEN}[INFO]${NC} $1" | tee -a "$LOG_FILE"; }
          warn() { echo -e "${YELLOW}[WARN]${NC} $1" | tee -a "$LOG_FILE"; }
          error() { echo -e "${RED}[ERROR]${NC} $1" | tee -a "$LOG_FILE"; exit 1; }

          log "Starting Webmin offline installation..."
          log "Package directory: $PACKAGE_DIR"

          # Check if running as root
          if [ "$EUID" -ne 0 ]; then
            error "Please run as root (use sudo)"
          fi

          # Check packages exist
          if [ ! -d "$PACKAGE_DIR" ] || [ -z "$(ls -A "$PACKAGE_DIR"/*.deb 2>/dev/null)" ]; then
            error "No packages found in $PACKAGE_DIR"
          fi

          # Install packages
          cd "$PACKAGE_DIR"
          log "Installing packages..."
          dpkg -i *.deb 2>&1 | tee -a "$LOG_FILE" || true

          # Fix broken dependencies
          log "Fixing dependencies..."
          apt-get install -f -y 2>&1 | tee -a "$LOG_FILE" || true

          # Reconfigure if needed
          dpkg --configure -a 2>&1 | tee -a "$LOG_FILE" || true

          # Enable and start Webmin
          log "Enabling Webmin service..."
          systemctl enable webmin || true
          systemctl start webmin || true

          # Get IP address
          IP_ADDR=$(hostname -I | awk '{print $1}')

          log "=========================================="
          log "✅ Webmin installed successfully!"
          log ""
          log "Access URLs:"
          log "  HTTPS: https://${IP_ADDR}:10000"
          log ""
          log "Default login: root (or your system user)"
          log "=========================================="
          INSTALLER
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN FULL LAMP BUNDLE
      # ============================================
      - name: Build Virtualmin Full (LAMP)
        if: github.event.inputs.bundle_type == 'virtualmin-full-lamp'
        run: |
          echo "=== Building Virtualmin Full (LAMP) ==="

          # Core Virtualmin packages
          apt-get install --download-only -y \
            webmin usermin virtualmin-base \
            virtualmin-core virtualmin-config \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true

          # Complete LAMP Stack
          apt-get install --download-only -y \
            apache2 apache2-utils apache2-bin \
            apache2-data apache2-doc \
            libapache2-mod-php libapache2-mod-fcgid \
            libapache2-mod-perl2 libapache2-mod-python \
            mariadb-server mariadb-client \
            mariadb-common mariadb-server-core \
            php php-cli php-fpm php-mysql \
            php-gd php-curl php-xml php-mbstring \
            php-zip php-intl php-bcmath php-json \
            php-opcache php-soap php-xmlrpc \
            php-bz2 php-readline php-sqlite3 \
            php-tidy php-xsl php-pear \
            2>/dev/null || true

          # Mail services
          apt-get install --download-only -y \
            bind9 bind9utils bind9-doc dnsutils \
            postfix postfix-pcre postfix-doc \
            dovecot-core dovecot-imapd dovecot-pop3d \
            dovecot-lmtpd dovecot-mysql \
            mailutils mailutils-mda \
            2>/dev/null || true

          # FTP & Security
          apt-get install --download-only -y \
            proftpd-basic proftpd-mod-vroot \
            proftpd-doc \
            clamav clamav-daemon clamav-freshclam \
            spamassassin spamc \
            fail2ban \
            ufw \
            2>/dev/null || true

          # SSL & Certificates
          apt-get install --download-only -y \
            certbot python3-certbot-apache \
            python3-certbot-dns-cloudflare \
            python3-certbot-dns-route53 \
            openssl ssl-cert \
            2>/dev/null || true

          # Additional tools
          apt-get install --download-only -y \
            awstats webalizer \
            phpmyadmin adminer \
            roundcube-core roundcube-mysql \
            2>/dev/null || true

          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ 2>/dev/null || true

          cat > /offline-bundle/scripts/install.sh << 'INSTALLER'
          #!/bin/bash
          # Offline Virtualmin Full (LAMP) Installer
          # Generated automatically - DO NOT EDIT

          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          PACKAGE_DIR="$SCRIPT_DIR/../packages"
          LOG_FILE="/var/log/offline-install.log"

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          NC='\033[0m'

          log() { echo -e "${GREEN}[INFO]${NC} $1" | tee -a "$LOG_FILE"; }
          warn() { echo -e "${YELLOW}[WARN]${NC} $1" | tee -a "$LOG_FILE"; }
          error() { echo -e "${RED}[ERROR]${NC} $1" | tee -a "$LOG_FILE"; exit 1; }
          info() { echo -e "${BLUE}[INFO]${NC} $1" | tee -a "$LOG_FILE"; }

          log "Starting Virtualmin Full (LAMP) offline installation..."

          if [ "$EUID" -ne 0 ]; then
            error "Please run as root (use sudo)"
          fi

          if [ ! -d "$PACKAGE_DIR" ] || [ -z "$(ls -A "$PACKAGE_DIR"/*.deb 2>/dev/null)" ]; then
            error "No packages found in $PACKAGE_DIR"
          fi

          # Pre-install configuration
          info "Pre-configuring packages..."
          export DEBIAN_FRONTEND=noninteractive

          # Set default passwords for services
          MYSQL_ROOT_PASS="${MYSQL_ROOT_PASS:-$(openssl rand -base64 24)}"
          POSTFIX_CONFIG="internet"

          # Pre-configure MySQL
          debconf-set-selections << EOF || true
          mysql-server mysql-server/root_password password $MYSQL_ROOT_PASS
          mysql-server mysql-server/root_password_again password $MYSQL_ROOT_PASS
          EOF

          cd "$PACKAGE_DIR"

          # Install in order: base -> web -> db -> mail -> extras
          log "Phase 1/5: Installing base system packages..."
          dpkg -i $(ls *.deb | grep -E "(libc|libssl|perl|python|ca-certificates)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 2/5: Installing Webmin/Usermin..."
          dpkg -i $(ls *.deb | grep -E "(webmin|usermin|virtualmin)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 3/5: Installing Apache & PHP..."
          dpkg -i $(ls *.deb | grep -E "(apache2|libapache2|php)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 4/5: Installing MariaDB..."
          dpkg -i $(ls *.deb | grep -E "(mariadb|mysql)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 5/5: Installing Mail, DNS, FTP & Security..."
          dpkg -i $(ls *.deb | grep -vE "(webmin|usermin|virtualmin|apache2|libapache2|php|mariadb|mysql)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          # Fix all dependencies
          log "Fixing broken dependencies..."
          apt-get install -f -y 2>&1 | tee -a "$LOG_FILE" || true
          dpkg --configure -a 2>&1 | tee -a "$LOG_FILE" || true

          # Enable all services
          log "Enabling services..."
          SERVICES="apache2 mariadb postfix dovecot bind9 fail2ban webmin"
          for svc in $SERVICES; do
            systemctl enable $svc 2>/dev/null || warn "Could not enable $svc"
            systemctl start $svc 2>/dev/null || warn "Could not start $svc"
          done

          # Secure MySQL
          if command -v mysql >/dev/null 2>&1; then
            info "Securing MariaDB..."
            mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '$MYSQL_ROOT_PASS';" 2>/dev/null || true
            mysql -e "DELETE FROM mysql.user WHERE User='';" 2>/dev/null || true
            mysql -e "DELETE FROM mysql.user WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1');" 2>/dev/null || true
            mysql -e "DROP DATABASE IF EXISTS test;" 2>/dev/null || true
            mysql -e "FLUSH PRIVILEGES;" 2>/dev/null || true
          fi

          # Save credentials
          cat > /root/.virtualmin-credentials << EOF
          Virtualmin Installation Credentials
          Generated: $(date)
          =====================================
          MariaDB Root Password: $MYSQL_ROOT_PASS
          Webmin URL: https://$(hostname -I | awk '{print $1}'):10000
          Usermin URL: https://$(hostname -I | awk '{print $1}'):20000
          =====================================
          EOF
          chmod 600 /root/.virtualmin-credentials

          IP_ADDR=$(hostname -I | awk '{print $1}')

          log "=========================================="
          log "✅ Virtualmin Full (LAMP) installed!"
          log ""
          log "🌐 Access URLs:"
          log "   Webmin:  https://${IP_ADDR}:10000"
          log "   Usermin: https://${IP_ADDR}:20000"
          log "   Website: http://${IP_ADDR}"
          log ""
          log "📊 Installed Services:"
          log "   Web Server: Apache2"
          log "   Database:   MariaDB"
          log "   PHP:        $(php -v 2>/dev/null | head -1 || echo 'Installed')"
          log "   Mail:       Postfix + Dovecot"
          log "   DNS:        BIND9"
          log "   FTP:        ProFTPd"
          log "   Security:   Fail2Ban + ClamAV + SpamAssassin"
          log ""
          log "🔐 Credentials saved to: /root/.virtualmin-credentials"
          log "=========================================="
          INSTALLER
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN FULL LEMP BUNDLE
      # ============================================
      - name: Build Virtualmin Full (LEMP)
        if: github.event.inputs.bundle_type == 'virtualmin-full-lemp'
        run: |
          echo "=== Building Virtualmin Full (LEMP) ==="

          # Core Virtualmin
          apt-get install --download-only -y \
            webmin usermin virtualmin-base \
            virtualmin-core virtualmin-config \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true

          # Complete LEMP Stack
          apt-get install --download-only -y \
            nginx nginx-common nginx-full \
            nginx-extras nginx-doc \
            php-fpm php-cli php-mysql \
            php-gd php-curl php-xml php-mbstring \
            php-zip php-intl php-bcmath php-json \
            php-opcache php-soap php-xmlrpc \
            php-bz2 php-readline php-sqlite3 \
            php-tidy php-xsl php-pear \
            2>/dev/null || true

          # MariaDB
          apt-get install --download-only -y \
            mariadb-server mariadb-client \
            mariadb-common mariadb-server-core \
            2>/dev/null || true

          # Mail services
          apt-get install --download-only -y \
            bind9 bind9utils bind9-doc dnsutils \
            postfix postfix-pcre postfix-doc \
            dovecot-core dovecot-imapd dovecot-pop3d \
            dovecot-lmtpd dovecot-mysql \
            mailutils mailutils-mda \
            2>/dev/null || true

          # FTP & Security
          apt-get install --download-only -y \
            proftpd-basic proftpd-mod-vroot \
            proftpd-doc \
            clamav clamav-daemon clamav-freshclam \
            spamassassin spamc \
            fail2ban \
            ufw \
            2>/dev/null || true

          # SSL & Certificates (Certbot for Nginx)
          apt-get install --download-only -y \
            certbot python3-certbot-nginx \
            python3-certbot-dns-cloudflare \
            python3-certbot-dns-route53 \
            openssl ssl-cert \
            2>/dev/null || true

          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ 2>/dev/null || true

          cat > /offline-bundle/scripts/install.sh << 'INSTALLER'
          #!/bin/bash
          # Offline Virtualmin Full (LEMP) Installer

          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          PACKAGE_DIR="$SCRIPT_DIR/../packages"
          LOG_FILE="/var/log/offline-install.log"

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          NC='\033[0m'

          log() { echo -e "${GREEN}[INFO]${NC} $1" | tee -a "$LOG_FILE"; }
          warn() { echo -e "${YELLOW}[WARN]${NC} $1" | tee -a "$LOG_FILE"; }
          error() { echo -e "${RED}[ERROR]${NC} $1" | tee -a "$LOG_FILE"; exit 1; }
          info() { echo -e "${BLUE}[INFO]${NC} $1" | tee -a "$LOG_FILE"; }

          log "Starting Virtualmin Full (LEMP) offline installation..."

          if [ "$EUID" -ne 0 ]; then
            error "Please run as root (use sudo)"
          fi

          if [ ! -d "$PACKAGE_DIR" ] || [ -z "$(ls -A "$PACKAGE_DIR"/*.deb 2>/dev/null)" ]; then
            error "No packages found in $PACKAGE_DIR"
          fi

          export DEBIAN_FRONTEND=noninteractive
          MYSQL_ROOT_PASS="${MYSQL_ROOT_PASS:-$(openssl rand -base64 24)}"

          debconf-set-selections << EOF || true
          mysql-server mysql-server/root_password password $MYSQL_ROOT_PASS
          mysql-server mysql-server/root_password_again password $MYSQL_ROOT_PASS
          EOF

          cd "$PACKAGE_DIR"

          log "Phase 1/5: Base system..."
          dpkg -i $(ls *.deb | grep -E "(libc|libssl|perl|python|ca-certificates)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 2/5: Webmin/Usermin..."
          dpkg -i $(ls *.deb | grep -E "(webmin|usermin|virtualmin)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 3/5: Nginx & PHP-FPM..."
          dpkg -i $(ls *.deb | grep -E "(nginx|php)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 4/5: MariaDB..."
          dpkg -i $(ls *.deb | grep -E "(mariadb|mysql)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Phase 5/5: Mail, DNS, FTP & Security..."
          dpkg -i $(ls *.deb | grep -vE "(webmin|usermin|virtualmin|nginx|php|mariadb|mysql)" 2>/dev/null) 2>&1 | tee -a "$LOG_FILE" || true

          log "Fixing dependencies..."
          apt-get install -f -y 2>&1 | tee -a "$LOG_FILE" || true
          dpkg --configure -a 2>&1 | tee -a "$LOG_FILE" || true

          log "Enabling services..."
          SERVICES="nginx php*-fpm mariadb postfix dovecot bind9 fail2ban webmin"
          for svc in $SERVICES; do
            systemctl enable $svc 2>/dev/null || warn "Could not enable $svc"
            systemctl start $svc 2>/dev/null || warn "Could not start $svc"
          done

          # Configure Nginx for PHP-FPM
          if [ -f /etc/nginx/nginx.conf ]; then
            info "Configuring Nginx for PHP-FPM..."
            # Create default PHP-FPM config if not exists
            if [ ! -f /etc/nginx/sites-enabled/default ]; then
              cat > /etc/nginx/sites-available/default << 'NGINXCONF'
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              root /var/www/html;
              index index.php index.html index.htm;
              server_name _;
              location / {
                  try_files $uri $uri/ =404;
              }
              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/var/run/php/php-fpm.sock;
              }
          }
          NGINXCONF
              ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default 2>/dev/null || true
            fi
            nginx -t 2>/dev/null || warn "Nginx config test failed"
            systemctl restart nginx 2>/dev/null || true
          fi

          # Secure MySQL
          if command -v mysql >/dev/null 2>&1; then
            info "Securing MariaDB..."
            mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '$MYSQL_ROOT_PASS';" 2>/dev/null || true
            mysql -e "DELETE FROM mysql.user WHERE User='';" 2>/dev/null || true
            mysql -e "DELETE FROM mysql.user WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1');" 2>/dev/null || true
            mysql -e "DROP DATABASE IF EXISTS test;" 2>/dev/null || true
            mysql -e "FLUSH PRIVILEGES;" 2>/dev/null || true
          fi

          cat > /root/.virtualmin-credentials << EOF
          Virtualmin Installation Credentials
          Generated: $(date)
          =====================================
          MariaDB Root Password: $MYSQL_ROOT_PASS
          Webmin URL: https://$(hostname -I | awk '{print $1}'):10000
          Usermin URL: https://$(hostname -I | awk '{print $1}'):20000
          =====================================
          EOF
          chmod 600 /root/.virtualmin-credentials

          IP_ADDR=$(hostname -I | awk '{print $1}')

          log "=========================================="
          log "✅ Virtualmin Full (LEMP) installed!"
          log ""
          log "🌐 Access URLs:"
          log "   Webmin:  https://${IP_ADDR}:10000"
          log "   Usermin: https://${IP_ADDR}:20000"
          log "   Website: http://${IP_ADDR}"
          log ""
          log "📊 Installed Services:"
          log "   Web Server: Nginx + PHP-FPM"
          log "   Database:   MariaDB"
          log "   PHP:        $(php -v 2>/dev/null | head -1 || echo 'Installed')"
          log "   Mail:       Postfix + Dovecot"
          log "   DNS:        BIND9"
          log "   FTP:        ProFTPd"
          log "   Security:   Fail2Ban + ClamAV + SpamAssassin"
          log ""
          log "🔐 Credentials saved to: /root/.virtualmin-credentials"
          log "=========================================="
          INSTALLER
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN MINI LAMP BUNDLE
      # ============================================
      - name: Build Virtualmin Mini (LAMP)
        if: github.event.inputs.bundle_type == 'virtualmin-mini-lamp'
        run: |
          echo "=== Building Virtualmin Mini (LAMP) ==="

          apt-get install --download-only -y \
