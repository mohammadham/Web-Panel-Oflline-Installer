          UBUNTU_VER="${{ github.event.inputs.ubuntu_version }}"
          BUILD_DATE="$(date -u +%Y%m%d_%H%M%S)"
          SHORT_DATE="$(date -u +%Y%m%d)"

          ARCHIVE_NAME="offline-${BUNDLE_TYPE}-${UBUNTU_VER}-${BUILD_DATE}"

          echo "Creating archive: ${ARCHIVE_NAME}.tar.gz"
          tar -czf "${ARCHIVE_NAME}.tar.gz" offline-bundle

          # Create SHA256 checksum
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

          # Create info file
          cat > "${ARCHIVE_NAME}.info.txt" << EOF
          Bundle: ${BUNDLE_TYPE}
          Ubuntu: ${UBUNTU_VER}
          Build Date: ${BUILD_DATE}
          Packages: $(ls /offline-bundle/packages/*.deb 2>/dev/null | wc -l)
          Size: $(du -sh /offline-bundle/packages/ 2>/dev/null | cut -f1 || echo 'N/A')
          EOF

          ls -lh "${ARCHIVE_NAME}"*

          # Set outputs for release
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          echo "BUNDLE_TYPE=${BUNDLE_TYPE}" >> $GITHUB_ENV
          echo "UBUNTU_VER=${UBUNTU_VER}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "SHORT_DATE=${SHORT_DATE}" >> $GITHUB_ENV

      # ============================================
      # UPLOAD ARTIFACT (ALWAYS)
      # ============================================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            /*.tar.gz
            /*.sha256
            /*.info.txt
          retention-days: 30

      # ============================================
      # CREATE RELEASE (AUTO OR MANUAL TAG)
      # ============================================
      - name: Determine Release Tag
        id: release_tag
        run: |
          BUNDLE_TYPE="${{ env.BUNDLE_TYPE }}"
          UBUNTU_VER="${{ env.UBUNTU_VER }}"
          SHORT_DATE="${{ env.SHORT_DATE }}"
          INPUT_VERSION="${{ github.event.inputs.release_version }}"

          if [ -n "$INPUT_VERSION" ]; then
            TAG_NAME="$INPUT_VERSION"
          else
            TAG_NAME="${BUNDLE_TYPE}-${UBUNTU_VER}-${SHORT_DATE}"
          fi

          # Ensure unique tag
          COUNTER=1
          BASE_TAG="$TAG_NAME"
          while git ls-remote --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; do
            TAG_NAME="${BASE_TAG}-r${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done

          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "release_name=Offline ${BUNDLE_TYPE} for Ubuntu ${UBUNTU_VER} (${SHORT_DATE})" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.release_tag.outputs.tag_name }}" -m "${{ steps.release_tag.outputs.release_name }}"
          git push origin "${{ steps.release_tag.outputs.tag_name }}" || echo "Tag may already exist or push failed"
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          name: ${{ steps.release_tag.outputs.release_name }}
          body: |
            ## 🔒 Offline Server Management Bundle

            **Bundle Type:** ${{ env.BUNDLE_TYPE }}
            **Ubuntu Version:** ${{ env.UBUNTU_VER }}
            **Build Date:** ${{ env.BUILD_DATE }}

            ### 📦 Contents
            - Complete offline installation packages
            - Automated installation script (`install.sh`)
            - Local APT repository setup (`add-repo.sh`)
            - Comprehensive documentation (README, INSTALL guide)
            - Package manifest

            ### 🚀 Quick Start
            1. Download the `.tar.gz` archive
            2. Transfer to your offline Ubuntu server
            3. Extract and run `sudo ./scripts/install.sh`

            ### 📊 Bundle Details
            - **Package Count:** ${{ steps.verify.outputs.pkg_count || 'See archive' }}
            - **Total Size:** See archive info file
            - **No internet required** for installation

            ### 🔧 Included Services
            ${{ env.BUNDLE_TYPE == 'webmin-only' && '- Webmin Control Panel (port 10000)' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'virtualmin') && '- Virtualmin/Webmin Control Panel' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'lamp') && '- Apache2 Web Server' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'lemp') && '- Nginx Web Server + PHP-FPM' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'virtualmin') && '- MariaDB Database' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'full') && '- Postfix Mail Server' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'full') && '- Dovecot IMAP/POP3' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'full') && '- BIND9 DNS Server' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'full') && '- ProFTPd FTP Server' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'full') && '- Fail2Ban + ClamAV + SpamAssassin' || '' }}
            ${{ contains(env.BUNDLE_TYPE, 'cockpit') && '- Cockpit Server Management (port 9090)' || '' }}

            ### 📖 Documentation
            See the included `README.md` and `docs/INSTALL.md` for detailed instructions.

            ---
            *Built automatically by GitHub Actions*
            *For air-gapped/offline server installations*
          files: |
            /*.tar.gz
            /*.sha256
            /*.info.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
