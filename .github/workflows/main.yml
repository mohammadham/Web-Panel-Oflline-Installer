
# Let me fix the escaping issues in the workflow file
name: Build Offline Virtualmin/Webmin Package Bundle (Fixed + LAMP/LEMP)

on:
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: 'Ubuntu Version (jammy/noble)'
        required: true
        default: 'jammy'
        type: choice
        options:
          - jammy
          - noble
      bundle_type:
        description: 'Bundle Type'
        required: true
        default: 'virtualmin-full-lamp'
        type: choice
        options:
          - webmin-only
          - virtualmin-full-lamp
          - virtualmin-full-lemp
          - virtualmin-mini-lamp
          - virtualmin-mini-lemp
          - cockpit-web

jobs:
  build-offline-bundle:
    runs-on: ubuntu-latest
    container: ubuntu:${{ github.event.inputs.ubuntu_version }}
    
    steps:
      - name: Setup Environment
        run: |
          apt-get update
          apt-get install -y wget curl gnupg2 ca-certificates lsb-release dpkg-dev apt-utils
          mkdir -p /offline-bundle/packages
          mkdir -p /offline-bundle/scripts
          mkdir -p /offline-bundle/repos
          mkdir -p /etc/apt/keyrings

      # ============================================
      # SETUP VIRTUALMIN REPOSITORY WITH FALLBACK
      # ============================================
      - name: Setup Virtualmin Repository (3-Fallback Method)
        if: |
          contains(github.event.inputs.bundle_type, 'virtualmin')
        run: |
          echo "=== Attempting Method 1: Standard GPG Key Download ==="
          METHOD1_SUCCESS=false
          
          # Method 1: Download GPG key with curl to keyring
          if curl -fsSL --connect-timeout 15 --max-time 30 \
            "https://software.virtualmin.com/lib/RPM-GPG-KEY-virtualmin-7" \
            -o /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
            
            if gpg --dry-run --import /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
              echo "deb [signed-by=/etc/apt/keyrings/virtualmin-7.asc] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
                > /etc/apt/sources.list.d/virtualmin.list
              METHOD1_SUCCESS=true
              echo "✅ Method 1 SUCCESS: GPG key downloaded and validated"
            else
              echo "⚠️ Method 1 FAILED: Invalid GPG key content"
            fi
          else
            echo "⚠️ Method 1 FAILED: Could not download GPG key"
          fi
          
          # Method 2: Try older Virtualmin 6 key
          if [ "$METHOD1_SUCCESS" = false ]; then
            echo "=== Attempting Method 2: Virtualmin 6 GPG Key ==="
            if curl -fsSL --connect-timeout 15 --max-time 30 \
              "https://software.virtualmin.com/lib/RPM-GPG-KEY-virtualmin-6" \
              -o /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
              
              if gpg --dry-run --import /etc/apt/keyrings/virtualmin-7.asc 2>/dev/null; then
                echo "deb [signed-by=/etc/apt/keyrings/virtualmin-7.asc] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
                  > /etc/apt/sources.list.d/virtualmin.list
                METHOD1_SUCCESS=true
                echo "✅ Method 2 SUCCESS: Virtualmin 6 key worked"
              else
                echo "⚠️ Method 2 FAILED: Invalid Virtualmin 6 key"
              fi
            else
              echo "⚠️ Method 2 FAILED: Could not download Virtualmin 6 key"
            fi
          fi
          
          # Method 3: Try Webmin developers key as fallback
          if [ "$METHOD1_SUCCESS" = false ]; then
            echo "=== Attempting Method 3: Webmin Developers Key ==="
            if curl -fsSL --connect-timeout 15 --max-time 30 \
              "https://download.webmin.com/jcameron-key.asc" \
              -o /etc/apt/keyrings/webmin.asc 2>/dev/null; then
              
              if gpg --dry-run --import /etc/apt/keyrings/webmin.asc 2>/dev/null; then
                # Use Webmin repo instead for webmin package
                echo "deb [signed-by=/etc/apt/keyrings/webmin.asc] https://download.webmin.com/download/repository sarge contrib" \
                  > /etc/apt/sources.list.d/webmin.list
                echo "deb [trusted=yes] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
                  > /etc/apt/sources.list.d/virtualmin.list
                METHOD1_SUCCESS=true
                echo "✅ Method 3 SUCCESS: Using Webmin key + trusted Virtualmin repo"
              else
                echo "⚠️ Method 3 FAILED: Invalid Webmin key"
              fi
            else
              echo "⚠️ Method 3 FAILED: Could not download Webmin key"
            fi
          fi
          
          # Final Fallback: No GPG verification
          if [ "$METHOD1_SUCCESS" = false ]; then
            echo "=== FALLBACK: Using trusted repository (no GPG check) ==="
            echo "deb [trusted=yes] https://software.virtualmin.com/vm/7/gpl/apt virtualmin main" \
              > /etc/apt/sources.list.d/virtualmin.list
            echo "⚠️ FALLBACK ACTIVE: No GPG verification - USE WITH CAUTION"
          fi
          
          # Always add Webmin repo as backup
          echo "deb [trusted=yes] https://download.webmin.com/download/repository sarge contrib" \
            > /etc/apt/sources.list.d/webmin-backup.list || true
          
          # Update package lists
          echo "=== Updating package lists ==="
          apt-get update || echo "Some repositories failed, continuing..."

      # ============================================
      # WEBMIN ONLY BUNDLE
      # ============================================
      - name: Download Webmin + Dependencies
        if: github.event.inputs.bundle_type == 'webmin-only'
        run: |
          # Setup Webmin repository with fallback
          mkdir -p /etc/apt/keyrings
          
          if curl -fsSL --connect-timeout 15 --max-time 30 \
            "https://download.webmin.com/jcameron-key.asc" \
            -o /etc/apt/keyrings/webmin.asc 2>/dev/null; then
            echo "deb [signed-by=/etc/apt/keyrings/webmin.asc] https://download.webmin.com/download/repository sarge contrib" \
              > /etc/apt/sources.list.d/webmin.list
          else
            echo "deb [trusted=yes] https://download.webmin.com/download/repository sarge contrib" \
              > /etc/apt/sources.list.d/webmin.list
          fi
          
          apt-get update || true
          
          # Download Webmin and all dependencies
          apt-get install --download-only -y webmin || \
          apt-get install --download-only -y --allow-unauthenticated webmin || true
          
          # Download common dependencies explicitly
          apt-get install --download-only -y \
            perl libnet-ssleay-perl openssl \
            libauthen-pam-perl libpam-runtime \
            libio-pty-perl apt-show-versions python3 \
            unzip shared-mime-info || true
          
          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ || true
          
          # Create install script
          cat > /offline-bundle/scripts/install.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR/../packages"
          
          echo "Installing Webmin and dependencies..."
          dpkg -i *.deb || true
          apt-get install -f -y
          
          systemctl enable webmin || true
          
          echo "=========================================="
          echo "✅ Webmin installed successfully!"
          echo "Access: https://$(hostname -I | awk '{print $1}'):10000"
          echo "=========================================="
          EOF
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN FULL LAMP BUNDLE
      # ============================================
      - name: Download Virtualmin Full (LAMP)
        if: github.event.inputs.bundle_type == 'virtualmin-full-lamp'
        run: |
          # Download Virtualmin core packages
          apt-get install --download-only -y \
            webmin usermin virtualmin-base \
            virtualmin-core virtualmin-config \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true
          
          # Download LAMP stack (Apache + MariaDB + PHP)
          apt-get install --download-only -y \
            apache2 apache2-utils apache2-bin \
            libapache2-mod-php libapache2-mod-fcgid \
            mariadb-server mariadb-client \
            php php-cli php-fpm php-mysql \
            php-gd php-curl php-xml php-mbstring \
            php-zip php-intl php-bcmath php-json \
            php-opcache php-soap php-xmlrpc \
            2>/dev/null || true
          
          # Download mail and DNS services
          apt-get install --download-only -y \
            bind9 bind9utils dnsutils \
            postfix postfix-pcre \
            dovecot-core dovecot-imapd dovecot-pop3d \
            2>/dev/null || true
          
          # Download FTP and security
          apt-get install --download-only -y \
            proftpd-basic proftpd-mod-vroot \
            clamav clamav-daemon \
            spamassassin \
            fail2ban \
            2>/dev/null || true
          
          # Download SSL/cert tools
          apt-get install --download-only -y \
            certbot python3-certbot-apache \
            2>/dev/null || true
          
          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ || true
          
          cat > /offline-bundle/scripts/install.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR/../packages"
          
          echo "Installing Virtualmin Full (LAMP Stack)..."
          dpkg -i *.deb || true
          apt-get install -f -y
          
          # Enable services
          systemctl enable apache2 || true
          systemctl enable mariadb || true
          systemctl enable postfix || true
          systemctl enable dovecot || true
          systemctl enable bind9 || true
          systemctl enable fail2ban || true
          systemctl enable webmin || true
          
          echo "=========================================="
          echo "✅ Virtualmin Full (LAMP) installed!"
          echo "Webmin:  https://$(hostname -I | awk '{print $1}'):10000"
          echo "Usermin: https://$(hostname -I | awk '{print $1}'):20000"
          echo "Web Server: Apache2"
          echo "Database: MariaDB"
          echo "=========================================="
          EOF
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN FULL LEMP BUNDLE
      # ============================================
      - name: Download Virtualmin Full (LEMP)
        if: github.event.inputs.bundle_type == 'virtualmin-full-lemp'
        run: |
          # Download Virtualmin core packages
          apt-get install --download-only -y \
            webmin usermin virtualmin-base \
            virtualmin-core virtualmin-config \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true
          
          # Download LEMP stack (Nginx + MariaDB + PHP)
          apt-get install --download-only -y \
            nginx nginx-common nginx-full \
            php-fpm php-cli php-mysql \
            php-gd php-curl php-xml php-mbstring \
            php-zip php-intl php-bcmath php-json \
            php-opcache php-soap php-xmlrpc \
            2>/dev/null || true
          
          # Download mail and DNS services
          apt-get install --download-only -y \
            bind9 bind9utils dnsutils \
            postfix postfix-pcre \
            dovecot-core dovecot-imapd dovecot-pop3d \
            2>/dev/null || true
          
          # Download FTP and security
          apt-get install --download-only -y \
            proftpd-basic proftpd-mod-vroot \
            clamav clamav-daemon \
            spamassassin \
            fail2ban \
            2>/dev/null || true
          
          # Download SSL/cert tools (Certbot for Nginx)
          apt-get install --download-only -y \
            certbot python3-certbot-nginx \
            2>/dev/null || true
          
          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ || true
          
          cat > /offline-bundle/scripts/install.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR/../packages"
          
          echo "Installing Virtualmin Full (LEMP Stack)..."
          dpkg -i *.deb || true
          apt-get install -f -y
          
          # Enable services
          systemctl enable nginx || true
          systemctl enable php*-fpm || true
          systemctl enable mariadb || true
          systemctl enable postfix || true
          systemctl enable dovecot || true
          systemctl enable bind9 || true
          systemctl enable fail2ban || true
          systemctl enable webmin || true
          
          # Configure Nginx for Virtualmin
          if [ -f /etc/nginx/nginx.conf ]; then
            echo "Nginx configured for Virtualmin"
          fi
          
          echo "=========================================="
          echo "✅ Virtualmin Full (LEMP) installed!"
          echo "Webmin:  https://$(hostname -I | awk '{print $1}'):10000"
          echo "Usermin: https://$(hostname -I | awk '{print $1}'):20000"
          echo "Web Server: Nginx + PHP-FPM"
          echo "Database: MariaDB"
          echo "=========================================="
          EOF
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN MINI LAMP BUNDLE
      # ============================================
      - name: Download Virtualmin Mini (LAMP)
        if: github.event.inputs.bundle_type == 'virtualmin-mini-lamp'
        run: |
          # Download minimal web stack with Apache
          apt-get install --download-only -y \
            webmin usermin \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true
          
          apt-get install --download-only -y \
            apache2 apache2-utils \
            mariadb-server mariadb-client \
            php php-cli php-fpm php-mysql \
            php-gd php-curl php-xml php-mbstring \
            certbot python3-certbot-apache \
            2>/dev/null || true
          
          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ || true
          
          cat > /offline-bundle/scripts/install.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR/../packages"
          
          echo "Installing Virtualmin Mini (LAMP)..."
          dpkg -i *.deb || true
          apt-get install -f -y
          
          systemctl enable apache2 || true
          systemctl enable mariadb || true
          systemctl enable webmin || true
          
          echo "=========================================="
          echo "✅ Virtualmin Mini (LAMP) installed!"
          echo "Webmin: https://$(hostname -I | awk '{print $1}'):10000"
          echo "Usermin: https://$(hostname -I | awk '{print $1}'):20000"
          echo "Web Server: Apache2"
          echo "=========================================="
          EOF
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # VIRTUALMIN MINI LEMP BUNDLE
      # ============================================
      - name: Download Virtualmin Mini (LEMP)
        if: github.event.inputs.bundle_type == 'virtualmin-mini-lemp'
        run: |
          # Download minimal web stack with Nginx
          apt-get install --download-only -y \
            webmin usermin \
            2>/dev/null || \
          apt-get install --download-only -y --allow-unauthenticated \
            webmin usermin \
            2>/dev/null || true
          
          apt-get install --download-only -y \
            nginx nginx-common \
            php-fpm php-cli php-mysql \
            php-gd php-curl php-xml php-mbstring \
            certbot python3-certbot-nginx \
            2>/dev/null || true
          
          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ || true
          
          cat > /offline-bundle/scripts/install.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR/../packages"
          
          echo "Installing Virtualmin Mini (LEMP)..."
          dpkg -i *.deb || true
          apt-get install -f -y
          
          systemctl enable nginx || true
          systemctl enable php*-fpm || true
          systemctl enable mariadb || true
          systemctl enable webmin || true
          
          echo "=========================================="
          echo "✅ Virtualmin Mini (LEMP) installed!"
          echo "Webmin: https://$(hostname -I | awk '{print $1}'):10000"
          echo "Usermin: https://$(hostname -I | awk '{print $1}'):20000"
          echo "Web Server: Nginx + PHP-FPM"
          echo "=========================================="
          EOF
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # COCKPIT + WEB BUNDLE
      # ============================================
      - name: Download Cockpit + Web Stack
        if: github.event.inputs.bundle_type == 'cockpit-web'
        run: |
          apt-get update || true
          
          # Download Cockpit and web modules
          apt-get install --download-only -y \
            cockpit cockpit-machines \
            cockpit-podman cockpit-storaged \
            cockpit-networkmanager \
            2>/dev/null || true
          
          # Download both Apache and Nginx for flexibility
          apt-get install --download-only -y \
            apache2 nginx \
            mariadb-server \
            php php-cli php-fpm php-mysql \
            2>/dev/null || true
          
          cp /var/cache/apt/archives/*.deb /offline-bundle/packages/ || true
          
          cat > /offline-bundle/scripts/install.sh << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR/../packages"
          
          echo "Installing Cockpit + Web Stack..."
          dpkg -i *.deb || true
          apt-get install -f -y
          
          systemctl enable cockpit.socket || true
          systemctl enable apache2 || true
          systemctl enable nginx || true
          systemctl enable mariadb || true
          
          echo "=========================================="
          echo "✅ Cockpit + Web Stack installed!"
          echo "Cockpit: https://$(hostname -I | awk '{print $1}'):9090"
          echo "Apache2: http://$(hostname -I | awk '{print $1}')"
          echo "Nginx:   http://$(hostname -I | awk '{print $1}') (if Apache disabled)"
          echo "=========================================="
          EOF
          chmod +x /offline-bundle/scripts/install.sh

      # ============================================
      # CREATE LOCAL APT REPOSITORY
      # ============================================
      - name: Create Local APT Repository
        run: |
          cd /offline-bundle/repos
          mkdir -p pool/main
          cp /offline-bundle/packages/*.deb pool/main/ 2>/dev/null || true
          
          if [ "$(ls -A pool/main/ 2>/dev/null)" ]; then
            # Create Packages index
            mkdir -p dists/stable/main/binary-amd64
            dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages 2>/dev/null || \
            (echo "Package: dummy" > dists/stable/main/binary-amd64/Packages)
            gzip -k -f dists/stable/main/binary-amd64/Packages 2>/dev/null || true
            
            # Create Release file
            cat > dists/stable/Release << EOF
          Origin: Offline Bundle
          Label: Offline Virtualmin/Webmin
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Offline package repository for air-gapped servers
          Date: $(date -Ru)
          EOF
            
            # Add hashes to Release
            {
              echo "MD5Sum:"
              find dists/stable -type f -exec md5sum {} \; 2>/dev/null | awk '{print " " $1 " " $2}' || true
              echo "SHA256:"
              find dists/stable -type f -exec sha256sum {} \; 2>/dev/null | awk '{print " " $1 " " $2}' || true
            } >> dists/stable/Release
            
            # Create sources.list template
            cat > /offline-bundle/scripts/add-repo.sh << 'EOF'
          #!/bin/bash
          # Run this on the offline server to add the local repository
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "deb [trusted=yes] file:$SCRIPT_DIR/../repos stable main" > /etc/apt/sources.list.d/offline.list
          apt-get update || true
          EOF
            chmod +x /offline-bundle/scripts/add-repo.sh
          fi

      # ============================================
      # CREATE README
      # ============================================
      - name: Create README
        run: |
          cat > /offline-bundle/README.md << 'EOF'
          # Offline Package Bundle

          ## Type: ${{ github.event.inputs.bundle_type }}
          ## Ubuntu: ${{ github.event.inputs.ubuntu_version }}

          ### Installation on Air-Gapped Server:

          1. Transfer this entire folder to your offline server (USB/SCP/FTP)
          2. Run the install script:
             ```bash
             cd /path/to/offline-bundle/scripts
             sudo ./install.sh
             ```

          3. Or use the local APT repository:
             ```bash
             sudo ./scripts/add-repo.sh
             sudo apt-get install webmin  # or other packages
             ```

          ### Contents:
          - packages/ - All .deb files
          - repos/ - Local APT repository (if packages exist)
          - scripts/ - Installation scripts

          ### Bundle Types:
          - **webmin-only**: Webmin panel only
          - **virtualmin-full-lamp**: Full hosting panel + Apache + MariaDB + PHP
          - **virtualmin-full-lemp**: Full hosting panel + Nginx + MariaDB + PHP
          - **virtualmin-mini-lamp**: Minimal panel + Apache + MariaDB + PHP
          - **virtualmin-mini-lemp**: Minimal panel + Nginx + MariaDB + PHP
          - **cockpit-web**: Cockpit + both web servers
          EOF

      # ============================================
      # VERIFY AND PACKAGE
      # ============================================
      - name: Verify Bundle Contents
        run: |
          echo "=== Bundle Contents ==="
          echo "Packages:"
          ls -la /offline-bundle/packages/ | head -20
          echo "---"
          echo "Scripts:"
          ls -la /offline-bundle/scripts/
          echo "---"
          echo "Total package count:"
          ls /offline-bundle/packages/*.deb 2>/dev/null | wc -l
          echo "Total size:"
          du -sh /offline-bundle/packages/ 2>/dev/null || echo "0"

      - name: Create Archive
        run: |
          cd /
          BUNDLE_NAME="offline-${{ github.event.inputs.bundle_type }}-${{ github.event.inputs.ubuntu_version }}-$(date +%Y%m%d_%H%M%S)"
          tar -czf "${BUNDLE_NAME}.tar.gz" offline-bundle
          ls -lh "${BUNDLE_NAME}.tar.gz"
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_NAME }}
          path: /*.tar.gz
          retention-days: 30

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: /*.tar.gz
